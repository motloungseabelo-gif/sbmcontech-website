<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="refresh" content="5;url=index.html">
</head>
<body>

<div class="container">

    <div class="logo-wrap">
        <img src="images/Logo.png" alt="SBM Logo">
    </div>

    <div class="badge">✅ Submission successful</div>

    <h1>Message Sent Successfully</h1>
    <p>We received your request. SBM ConTech Industries will get back to you shortly with premium support and smart solutions.</p>

    <p class="redirect-text">
        Redirecting to homepage in <span class="countdown" id="countdown">5</span> seconds...
    </p>

    <div class="progress"><span></span></div>

    <div class="actions">
        <a href="index.html" class="btn btn-primary">Go Home</a>

        <a href="https://wa.me/27814017386?text=Hi%20SBM%20I%20just%20submitted%20a%20form"
           class="btn btn-whatsapp"
           target="_blank"
           rel="noopener noreferrer">
           Chat on WhatsApp
        </a>

        <a href="https://www.instagram.com/sbmcontechindustries/"
           class="btn btn-instagram"
           target="_blank"
           rel="noopener noreferrer">
           Follow on Instagram
        </a>
    </div>

</div>

<script>
let seconds = 5;
const countdown = document.getElementById("countdown");

const timer = setInterval(() => {
    seconds--;
    if (countdown) countdown.textContent = seconds;

    if (seconds <= 0) {
        clearInterval(timer);
    }
}, 1000);
</script>
