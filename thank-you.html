<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent | SBM</title>

<meta http-equiv="refresh" content="5;url=index.html">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background:
        radial-gradient(circle at top, rgba(0,212,255,0.14), transparent 35%),
        linear-gradient(135deg, #0b1830, #16284d 45%, #1d3566 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: white;
    text-align: center;
    overflow: hidden;
    padding: 24px;
}

body::before,
body::after {
    content: "";
    position: absolute;
    width: 380px;
    height: 380px;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.18;
    z-index: 0;
}

body::before {
    background: #00d4ff;
    top: -80px;
    left: -100px;
}

body::after {
    background: #25D366;
    bottom: -100px;
    right: -100px;
}

.container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    padding: 42px 30px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    backdrop-filter: blur(16px);
    box-shadow: 0 20px 70px rgba(0,0,0,0.35);
    animation: cardIn 0.65s ease;
}

.logo-wrap {
    width: 110px;
    height: 110px;
    margin: 0 auto 18px;
    border-radius: 24px;
    background: rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: float 3s ease-in-out infinite;
}

img {
    width: 76px;
    height: auto;
    display: block;
}

.badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(0,212,255,0.12);
    border: 1px solid rgba(0,212,255,0.22);
    color: #9fefff;
    font-size: 0.92rem;
    margin-bottom: 16px;
}

h1 {
    margin: 0 0 12px;
    font-size: 2.1rem;
    line-height: 1.15;
}

p {
    margin: 0 auto 12px;
    max-width: 430px;
    color: rgba(255,255,255,0.84);
    line-height: 1.65;
}

.redirect-text {
    margin-top: 18px;
    font-size: 0.96rem;
    color: #cfe8ff;
}

.countdown {
    display: inline-block;
    min-width: 24px;
    font-weight: bold;
    color: #00d4ff;
}

.progress {
    width: 100%;
    max-width: 250px;
    height: 7px;
    margin: 22px auto 0;
    background: rgba(255,255,255,0.12);
    border-radius: 999px;
    overflow: hidden;
}

.progress span {
    display: block;
    height: 100%;
    width: 0%;
    border-radius: inherit;
    background: linear-gradient(90deg, #00d4ff, #25D366);
    animation: loading 5s linear forwards;
}

.actions {
    margin-top: 28px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
}

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 150px;
    padding: 12px 20px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
}

.btn:hover {
    transform: translateY(-2px);
}

.btn-primary {
    background: #00d4ff;
    color: #07111f;
    box-shadow: 0 10px 24px rgba(0,212,255,0.22);
}

.btn-whatsapp {
    background: #25D366;
    color: #07111f;
    box-shadow: 0 10px 24px rgba(37,211,102,0.22);
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

@keyframes loading {
    from { width: 0%; }
    to { width: 100%; }
}

@keyframes cardIn {
    from {
        opacity: 0;
        transform: translateY(18px) scale(0.97);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="logo-wrap">
        <img src="images/Logo.png" alt="SBM Logo">
    </div>

    <div class="badge">✅ Submission successful</div>

    <h1>Message Sent Successfully</h1>
    <p>We received your request. SBM ConTech Industries will get back to you shortly with premium support and smart solutions.</p>

    <p class="redirect-text">
        Redirecting to homepage in <span class="countdown" id="countdown">5</span> seconds...
    </p>

    <div class="progress"><span></span></div>

    <div class="actions">
        <a href="index.html" class="btn btn-primary">Go Home</a>

        <a href="https://wa.me/27814017386?text=Hi%20SBM%20I%20just%20submitted%20a%20form"
           class="btn btn-whatsapp"
           target="_blank"
           rel="noopener noreferrer">
           Chat on WhatsApp
        </a>

        <a href="https://www.instagram.com/sbmcontechindustries/"
           class="btn btn-instagram"
           target="_blank"
           rel="noopener noreferrer">
           Follow on Instagram
        </a>
    </div>

</div>

<script>
let seconds = 5;
const countdown = document.getElementById("countdown");

const timer = setInterval(() => {
    seconds--;
    if (countdown) countdown.textContent = seconds;

    if (seconds <= 0) {
        clearInterval(timer);
    }
}, 1000);
</script>

</body>
</html>
